name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Scrape build info
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> "$GITHUB_ENV"
          echo "COMMIT_MESSAGE<<EOF" >> "$GITHUB_ENV"
          echo "${{ github.event.head_commit.message || github.event.pull_request.title || github.sha }}" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Build image for validation
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: gmx-ccxt-middleware:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_VERSION_TAG=${{ env.RELEASE_VERSION }}
            GIT_COMMIT_MESSAGE=${{ env.COMMIT_MESSAGE }}
            GIT_VERSION_HASH=${{ github.sha }}

      - name: Smoke test container startup
        run: |
          docker run --detach --rm \
            --name gmx-ccxt-middleware-smoke \
            --publish 18000:8000 \
            --env GMX_SERVER_ADDRESS=0.0.0.0:8000 \
            gmx-ccxt-middleware:ci
          trap 'docker logs gmx-ccxt-middleware-smoke; docker stop gmx-ccxt-middleware-smoke' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18000/ping >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs gmx-ccxt-middleware-smoke
          exit 1

  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha
            type=ref,event=tag

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scrape build info
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> "$GITHUB_ENV"
          echo "COMMIT_MESSAGE<<EOF" >> "$GITHUB_ENV"
          echo "${{ github.event.head_commit.message || github.sha }}" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_VERSION_TAG=${{ env.RELEASE_VERSION }}
            GIT_COMMIT_MESSAGE=${{ env.COMMIT_MESSAGE }}
            GIT_VERSION_HASH=${{ github.sha }}
