name: Acceptance smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"

permissions:
  contents: read

jobs:
  acceptance-smoke:
    if: ${{ secrets.JSON_RPC_ARBITRUM_SEPOLIA != '' && secrets.GMX_PRIVATE_KEY != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      JSON_RPC_ARBITRUM_SEPOLIA: ${{ secrets.JSON_RPC_ARBITRUM_SEPOLIA }}
      GMX_PRIVATE_KEY: ${{ secrets.GMX_PRIVATE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.4
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ccxt/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install project dependencies
        run: make install

      - name: Run Docker acceptance smoke test
        run: tests/acceptance/smoke-test.sh
